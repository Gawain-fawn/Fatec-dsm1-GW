<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletores básicos CSS3</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Demonstração de Seletores Básicos</h1>

    <!-- Seletor de elemento -->
    <p>Este parágrafo é estilizado pelo seletor de elemento (p).</p>


    <section>
        <p>Este é um novo parágrafo.</p>
    </section>

    <!-- Seletor de classe -->
     <p class="destaque">Este parágrafo está sendo estilizado pela classe "destaque".</p>
</body>
</html>
<!-- CSS (Cascading Style Sheet) é a linguagem responsável pela apresentação visual de documentos HTML. Enquanto o HTML define 
a estrutura e o conteúdo , o cSS controla cores, fontes layouts, espaçcamentos e animações. -->
